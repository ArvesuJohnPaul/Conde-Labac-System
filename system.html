<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brgy. Conde Labac — Sign In</title>
    <link rel="icon" type="image/x-icon" href="img/conde_labac_icon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&family=Space+Mono:wght@400;700&family=DM+Serif+Display:ital@0;1&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/shared.css" />
    <link rel="stylesheet" href="css/system.css" />
      <script src="js/api-config.js"></script>
      <script src="js/api.js"></script>
      <script src="js/icons.js"></script>
    <script src="js/audit-log.js"></script>
  </head>
  <body>
    <!-- ═══════════════════════════════ LOGIN SCREEN ═══════════════════════════════ -->
    <div id="login-screen">
      <div class="login-bg-pattern"></div>
      <div class="login-card">
        <div class="login-seal">
          <img src="img/conde%20labac%20logo.png" alt="Conde Labac Seal" />
        </div>
        <h1 class="login-title">Brgy. Conde Labac</h1>
        <p class="login-subtitle">
          Integrated Barangay Management System · Batangas City
        </p>

        <!-- Role is determined by the account itself (account.role) —
             no self-selected role chips. -->
        <label class="login-label">Username / Email</label>
        <input
          class="login-input"
          type="text"
          id="login-user"
          placeholder="e.g. admin@condelabac.gov.ph"
        />

        <label class="login-label">Password</label>
        <input
          class="login-input"
          type="password"
          id="login-pass"
          placeholder="••••••••"
        />

        <div id="login-error" style="color:#fca5a5;font-size:13px;min-height:18px;margin:6px 0"></div>

        <button class="login-btn" id="login-btn" onclick="doLogin()">Sign In to System</button>

        <div class="login-claim">
          New resident?
          <a href="claim-account.html">Claim your account <i data-icon=arrow-right></i></a>
        </div>

        <a href="index.html" class="login-back-link"
          ><i data-icon=arrow-left></i> Back to C.A.R.E.S. Landing Page</a
        >
      </div>
    </div>

    <script>
      const SESSION_KEY = "ibmdss.session";

      function getSession() {
        try {
          return JSON.parse(localStorage.getItem(SESSION_KEY));
        } catch (e) {
          return null;
        }
      }

      function setSession(session) {
        localStorage.setItem(SESSION_KEY, JSON.stringify(session));
      }

      // "Arvesu, John Paul A." → { initials: "JA", shortName: "John Arvesu" }
      function nameBits(name) {
        const parts = name.split(",");
        const last = (parts[0] || "").trim();
        const first = (parts[1] || "").trim();
        return {
          initials: ((first[0] || "") + (last[0] || "")).toUpperCase() || "U",
          shortName: ((first.split(" ")[0] || "") + " " + last).trim() || name,
        };
      }

      // Real login: the API answers with the account's kind and role — which
      // table the credentials matched decides staff vs resident.
      async function doLogin() {
        const user = document.getElementById("login-user").value.trim();
        const pass = document.getElementById("login-pass").value;
        const errEl = document.getElementById("login-error");
        const btn = document.getElementById("login-btn");
        errEl.textContent = "";
        if (!user || !pass) {
          errEl.textContent = "Please enter your email/username and password.";
          return;
        }
        btn.disabled = true;
        btn.textContent = "Signing in…";
        let acct;
        try {
          acct = await apiPost("/api/auth/login", {
            username: user,
            password: pass,
          });
        } catch (err) {
          errEl.textContent = err.message;
          btn.disabled = false;
          btn.textContent = "Sign In to System";
          return;
        }

        const bits = nameBits(acct.name);
        setSession({
          role: acct.role, // from the DB, not a chip
          kind: acct.kind, // "staff" | "resident"
          displayName: acct.name,
          shortName: bits.shortName,
          initials: bits.initials,
          user: acct.username,
          account_id: acct.account_id || null,
          resident_id: acct.resident_id || null,
        });

        if (typeof logAudit === "function")
          logAudit("LOGIN", `${acct.name} signed in as ${acct.role} (${acct.username})`, "info", "auth");

        if (acct.role === "Resident") {
          window.location.href = "index.html";
        } else {
          window.location.href = "pages/dashboard.html";
        }
      }

      // Submit on Enter from either field.
      ["login-user", "login-pass"].forEach((id) => {
        document.getElementById(id).addEventListener("keydown", (e) => {
          if (e.key === "Enter") doLogin();
        });
      });

      // If already logged in, redirect immediately
      const existing = getSession();
      if (existing) {
        if (existing.role === "Resident") {
          window.location.href = "index.html";
        } else {
          window.location.href = "pages/dashboard.html";
        }
      }
    </script>
  </body>
</html>
